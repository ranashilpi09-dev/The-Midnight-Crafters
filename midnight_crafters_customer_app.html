<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Midnight Crafters – T&S Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --peri: #CCCCFF; --pink: #FFB7C5; --purple: #9B59B6;
    --deep: #6C3483; --light-pink: #FFE4EC; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #D8D8FF; min-height: 100vh; }
  #capp { position: relative; overflow: hidden; min-height: 100vh; }
  .sparkle-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .sp { position: absolute; border-radius: 50%; animation: twinkle 2s infinite alternate; }
  @keyframes twinkle { 0%{opacity:0.2;transform:scale(0.5);} 100%{opacity:1;transform:scale(1.2);} }
  .sparkle-star { position: absolute; pointer-events: none; animation: starFloat 3s infinite alternate; color: #E8B4F8; }
  @keyframes starFloat { 0%{opacity:0.3;transform:translateY(0) rotate(0deg);} 100%{opacity:1;transform:translateY(-6px) rotate(20deg);} }
  .inner { position: relative; z-index: 1; padding-bottom: 2rem; max-width: 480px; margin: 0 auto; }
  .topbar { background: linear-gradient(135deg, #9B59B6, #C39BD3, #FFB7C5); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #E8B4F8; position: sticky; top: 0; z-index: 10; }
  .logo-circle { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #FFB7C5; overflow: hidden; flex-shrink: 0; background: #6C3483; display:flex; align-items:center; justify-content:center; }
  .logo-circle img { width:100%; height:100%; object-fit:cover; }
  .brand { flex: 1; }
  .brand h1 { font-family: 'Playfair Display', serif; font-size: 15px; color: #fff; font-weight: 700; line-height: 1.2; }
  .brand p { font-size: 11px; color: #FFE4EC; }
  .cart-btn { background: #FFB7C5; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; color: #6C3483; cursor: pointer; }
  .nav-tabs { display: flex; background: rgba(107,52,131,0.15); border-bottom: 1px solid #C39BD3; overflow-x: auto; position: sticky; top: 77px; z-index: 9; }
  .nav-tab { padding: 10px 16px; font-size: 12px; font-weight: 700; color: #6C3483; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; background: none; border-top:none; border-left:none; border-right:none; }
  .nav-tab.active { border-bottom-color: #9B59B6; background: rgba(255,183,197,0.3); }
  .page { display: none; padding: 16px; }
  .page.active { display: block; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #6C3483; margin-bottom: 8px; text-align: center; margin-top: 12px; }
  .glitter-divider { text-align: center; font-size: 14px; color: #C39BD3; margin: 4px 0 16px; letter-spacing: 4px; }
  .cat-label { font-size: 11px; font-weight: 700; color: #9B59B6; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 6px; }
  .item-card { background: linear-gradient(135deg, #fff 60%, #FFE4EC); border: 1.5px solid #E8B4F8; border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-start; }
  .item-img { width: 72px; height: 72px; border-radius: 12px; object-fit: cover; background: #EAD8FF; flex-shrink: 0; border: 1.5px solid #C39BD3; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .item-img img { width:72px; height:72px; border-radius:12px; object-fit:cover; }
  .item-info { flex: 1; }
  .item-name { font-family: 'Playfair Display', serif; font-size: 14px; color: #6C3483; font-weight: 700; }
  .item-desc { font-size: 11px; color: #9B59B6; margin: 2px 0 6px; }
  .item-price { font-size: 13px; font-weight: 700; color: #D85A8A; }
  .add-btn { background: linear-gradient(135deg, #9B59B6, #C39BD3); border: none; border-radius: 20px; padding: 6px 14px; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; margin-top: 6px; }
  .oos-badge { background: #FFE4EC; color: #D85A8A; border: 1px solid #FFB7C5; border-radius: 12px; padding: 4px 10px; font-size: 10px; font-weight: 700; margin-top: 6px; display: inline-block; }
  .about-card { background: linear-gradient(135deg, #fff 60%, #FFE4EC); border: 1.5px solid #E8B4F8; border-radius: 16px; padding: 18px; margin-bottom: 14px; text-align: center; }
  .about-avatar { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 10px; object-fit:cover; background: linear-gradient(135deg, #C39BD3, #FFB7C5); border: 2px solid #9B59B6; display:flex; align-items:center; justify-content:center; font-size:28px; overflow:hidden; }
  .about-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .about-name { font-family: 'Playfair Display', serif; font-size: 16px; color: #6C3483; font-weight: 700; margin-bottom: 6px; }
  .about-text { font-size: 13px; color: #9B59B6; line-height: 1.7; font-style: italic; }
  .event-card { background: linear-gradient(135deg, #EAD8FF, #FFE4EC); border: 1.5px solid #C39BD3; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
  .event-title { font-family: 'Playfair Display', serif; font-size: 15px; color: #6C3483; font-weight: 700; }
  .event-date { font-size: 12px; color: #9B59B6; margin-top: 4px; }
  .event-desc { font-size: 13px; color: #6C3483; margin-top: 6px; }
  .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #E8B4F8; }
  .remove-btn { background: none; border: none; color: #D85A8A; font-size: 18px; cursor: pointer; }
  .checkout-btn { width: 100%; background: linear-gradient(135deg, #9B59B6, #6C3483); color: #fff; border: none; border-radius: 20px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; font-family: 'Lato', sans-serif; }
  .empty-msg { text-align: center; color: #C39BD3; font-size: 13px; padding: 32px 16px; font-style: italic; }
  .overlay { position: fixed; inset: 0; background: rgba(107,52,131,0.22); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-box { background: #fff; border-radius: 20px; padding: 22px; width: 100%; max-width: 360px; border: 2px solid #E8B4F8; }
  .modal-box h3 { font-family: 'Playfair Display', serif; color: #6C3483; margin-bottom: 14px; font-size: 17px; }
  .fg { margin-bottom: 10px; }
  .fg label { font-size: 12px; font-weight: 700; color: #6C3483; display: block; margin-bottom: 4px; }
  .fg input, .fg textarea { width: 100%; border: 1.5px solid #C39BD3; border-radius: 10px; padding: 9px 12px; font-size: 13px; background: #fff; color: #6C3483; font-family: 'Lato', sans-serif; }
  .fg textarea { height: 72px; resize: none; }
  .upload-area { border: 2px dashed #C39BD3; border-radius: 12px; padding: 16px; text-align: center; color: #9B59B6; font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.5); }
  .modal-btn { background: linear-gradient(135deg, #9B59B6, #6C3483); color: #fff; border: none; border-radius: 20px; padding: 11px 20px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Lato', sans-serif; }
  .modal-cancel { background: #FFE4EC; color: #D85A8A; border: none; border-radius: 20px; padding: 9px 20px; font-size: 12px; cursor: pointer; width: 100%; margin-top: 6px; font-family: 'Lato', sans-serif; }
  .img-preview { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1.5px solid #C39BD3; margin-top: 8px; }
  .order-success { text-align: center; padding: 32px 16px; }
  .order-success h2 { font-family: 'Playfair Display', serif; color: #6C3483; font-size: 22px; margin-bottom: 10px; }
  .order-success p { font-size: 14px; color: #9B59B6; }
  .ref-img-preview { width:64px; height:64px; border-radius:8px; object-fit:cover; border:1.5px solid #C39BD3; margin-top:6px; display:none; }
</style>
</head>
<body>
<div id="capp">
  <div class="sparkle-bg" id="sparkles"></div>
  <div class="inner">
    <div class="topbar">
      <div class="logo-circle"><span style="font-size:22px;color:#FFB7C5;">✦</span></div>
      <div class="brand">
        <h1>The Midnight Crafters</h1>
        <p>T&S Co. ✦ Handmade with love</p>
      </div>
      <button class="cart-btn" onclick="switchTab('cart')">🛒 <span id="cartCount">0</span></button>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('shop',this)">✦ Shop</button>
      <button class="nav-tab" onclick="switchTab('events',this)">✦ Events</button>
      <button class="nav-tab" onclick="switchTab('about',this)">✦ About Us</button>
      <button class="nav-tab" onclick="switchTab('cart',this)">✦ Cart</button>
    </div>

    <div class="page active" id="page-shop">
      <div class="section-title">Our Collection</div>
      <div class="glitter-divider">✦ ✦ ✦</div>
      <div id="shopItems"></div>
    </div>

    <div class="page" id="page-events">
      <div class="section-title">Baking Events</div>
      <div class="glitter-divider">✦ ✦ ✦</div>
      <div id="eventsList"></div>
    </div>

    <div class="page" id="page-about">
      <div class="section-title">About Us</div>
      <div class="glitter-divider">✦ ✦ ✦</div>
      <div class="about-card">
        <div class="about-avatar" id="av-triansha">T</div>
        <div class="about-name">Triansha</div>
        <div class="about-text" id="bio-triansha">Coming soon...</div>
      </div>
      <div class="about-card">
        <div class="about-avatar" id="av-shloka">S</div>
        <div class="about-name">Shloka</div>
        <div class="about-text" id="bio-shloka">Coming soon...</div>
      </div>
      <div class="about-card">
        <div class="about-avatar">✦</div>
        <div class="about-name">Our Products</div>
        <div class="about-text" id="bio-products">Coming soon...</div>
      </div>
    </div>

    <div class="page" id="page-cart">
      <div class="section-title">Your Cart</div>
      <div class="glitter-divider">✦ ✦ ✦</div>
      <div id="cartItems"></div>
      <div id="cartCheckout"></div>
    </div>
  </div>
</div>

<!-- Customize Modal -->
<div id="customizeModal" style="display:none;" class="overlay">
  <div class="modal-box">
    <h3>✦ Customize your item</h3>
    <div class="fg">
      <label>Color / Theme / Topic</label>
      <textarea id="customText" placeholder="e.g. Blue stars theme, pastel rainbow, my dog's name is Luna..."></textarea>
    </div>
    <div class="fg">
      <label>Upload a reference photo (optional)</label>
      <div class="upload-area" onclick="document.getElementById('refPhoto').click()">📷 Tap to upload</div>
      <input type="file" id="refPhoto" accept="image/*" style="display:none;" onchange="previewRef(event)">
      <img id="refPreview" class="ref-img-preview">
    </div>
    <button class="modal-btn" onclick="confirmAdd()">Add to Cart ✦</button>
    <button class="modal-cancel" onclick="closeCustomize()">Cancel</button>
  </div>
</div>

<!-- Checkout Modal -->
<div id="checkoutModal" style="display:none;" class="overlay">
  <div class="modal-box">
    <h3>✦ Your Details</h3>
    <div class="fg"><label>Your Name</label><input type="text" id="buyerName" placeholder="Your name"></div>
    <div class="fg"><label>Your Address</label><textarea id="buyerAddress" placeholder="Flat no, building, society name..."></textarea></div>
    <div class="fg"><label>Phone Number</label><input type="tel" id="buyerPhone" placeholder="10-digit number"></div>
    <button class="modal-btn" onclick="placeOrder()">Place Order ✦</button>
    <button class="modal-cancel" onclick="document.getElementById('checkoutModal').style.display='none'">Cancel</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'tsc_shared_data';
let pendingItem = null;
let cart = [];
let refImgData = '';

function getShared() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || getDefaultData(); } catch(e) { return getDefaultData(); }
}
function getDefaultData() {
  return {
    items: [
      {id:1,name:'Bookmark Set',cat:'Stationery',desc:'Set of 4 handmade bookmarks',price:'₹80',emoji:'🔖',inStock:true,img:''},
      {id:2,name:'Washi Tape',cat:'Stationery',desc:'Glittery washi tape roll',price:'₹60',emoji:'🎀',inStock:true,img:''},
      {id:3,name:'Crochet Keychain',cat:'Craft',desc:'Cute hand-crocheted keychain',price:'₹120',emoji:'🧶',inStock:true,img:''},
      {id:4,name:'Decorated Notebook',cat:'Stationery',desc:'Personalized decorated notebook',price:'₹150',emoji:'📓',inStock:true,img:''},
      {id:5,name:'Chocolate Cupcake',cat:'Baked Goods',desc:'Rich homemade chocolate cupcake',price:'₹40',emoji:'🧁',inStock:true,img:''},
    ],
    events:[], about:{triansha:'',trianshaImg:'',shloka:'',shlokaImg:'',products:''}, orders:[]
  };
}

function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(el) el.classList.add('active');
  if(tab==='shop') renderShop();
  if(tab==='events') renderEvents();
  if(tab==='about') renderAbout();
  if(tab==='cart') renderCart();
}

function renderShop() {
  const data = getShared();
  const cats = [...new Set(data.items.map(i=>i.cat))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="cat-label">✦ ${cat}</div>`;
    data.items.filter(i=>i.cat===cat).forEach(item => {
      const imgHTML = item.img
        ? `<div class="item-img"><img src="${item.img}" alt="${item.name}"></div>`
        : `<div class="item-img">${item.emoji||'✨'}</div>`;
      html += `<div class="item-card">${imgHTML}<div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-price">${item.price}</div>
        ${item.inStock ? `<button class="add-btn" onclick="openCustomize(${item.id})">+ Add to Cart ✦</button>` : `<span class="oos-badge">Out of Stock</span>`}
      </div></div>`;
    });
  });
  if(!data.items.length) html = '<div class="empty-msg">No items yet! Check back soon ✦</div>';
  document.getElementById('shopItems').innerHTML = html;
}

function renderEvents() {
  const data = getShared();
  let html = '';
  if(!data.events||!data.events.length) {
    html = '<div class="empty-msg">No baking events announced yet ✦</div>';
  } else {
    data.events.forEach(ev => {
      html += `<div class="event-card">
        <div class="event-title">✦ ${ev.title}</div>
        <div class="event-date">📅 ${ev.date} &nbsp; 🕐 ${ev.time}</div>
        <div class="event-desc">${ev.desc}</div>
      </div>`;
    });
  }
  document.getElementById('eventsList').innerHTML = html;
}

function renderAbout() {
  const data = getShared();
  const ab = data.about || {};
  document.getElementById('bio-triansha').textContent = ab.triansha || 'Coming soon...';
  document.getElementById('bio-shloka').textContent = ab.shloka || 'Coming soon...';
  document.getElementById('bio-products').textContent = ab.products || 'Coming soon...';
  if(ab.trianshaImg) document.getElementById('av-triansha').innerHTML = `<img src="${ab.trianshaImg}" alt="Triansha">`;
  if(ab.shlokaImg) document.getElementById('av-shloka').innerHTML = `<img src="${ab.shlokaImg}" alt="Shloka">`;
}

function renderCart() {
  if(!cart.length) {
    document.getElementById('cartItems').innerHTML = '<div class="empty-msg">Your cart is empty ✦ Go add some goodies!</div>';
    document.getElementById('cartCheckout').innerHTML = '';
    return;
  }
  let total = 0, html = '';
  cart.forEach((ci,idx) => {
    const num = parseInt(ci.price.replace(/[^\d]/g,''))||0;
    total += num;
    html += `<div class="cart-item-row">
      <div>
        <div style="font-weight:700;color:#6C3483;font-size:13px;">${ci.name}</div>
        <div style="font-size:11px;color:#9B59B6;">${ci.customText||'No customization'}</div>
        ${ci.refPreview ? `<img src="${ci.refPreview}" class="img-preview">` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-weight:700;color:#D85A8A;">${ci.price}</span>
        <button class="remove-btn" onclick="removeCart(${idx})">✕</button>
      </div>
    </div>`;
  });
  document.getElementById('cartItems').innerHTML = html;
  document.getElementById('cartCheckout').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:700;color:#6C3483;">
      <span>Total</span><span style="color:#D85A8A;">₹${total}</span>
    </div>
    <button class="checkout-btn" onclick="document.getElementById('checkoutModal').style.display='flex'">✦ Checkout</button>`;
}

function openCustomize(itemId) {
  const data = getShared();
  pendingItem = data.items.find(i=>i.id===itemId);
  document.getElementById('customText').value = '';
  document.getElementById('refPreview').style.display = 'none';
  document.getElementById('refPreview').src = '';
  refImgData = '';
  document.getElementById('customizeModal').style.display = 'flex';
}

function closeCustomize() {
  document.getElementById('customizeModal').style.display = 'none';
  pendingItem = null;
}

function previewRef(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    refImgData = ev.target.result;
    document.getElementById('refPreview').src = ev.target.result;
    document.getElementById('refPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function confirmAdd() {
  if(!pendingItem) return;
  cart.push({...pendingItem, customText: document.getElementById('customText').value, refPreview: refImgData});
  document.getElementById('cartCount').textContent = cart.length;
  document.getElementById('customizeModal').style.display = 'none';
  pendingItem = null;
  alert('Added to cart! ✨');
}

function removeCart(idx) {
  cart.splice(idx,1);
  document.getElementById('cartCount').textContent = cart.length;
  renderCart();
}

function placeOrder() {
  const name = document.getElementById('buyerName').value.trim();
  const address = document.getElementById('buyerAddress').value.trim();
  const phone = document.getElementById('buyerPhone').value.trim();
  if(!name||!address) { alert('Please fill your name and address!'); return; }
  const data = getShared();
  const order = {
    id: Date.now(), name, address, phone,
    items: cart.map(c=>({name:c.name,price:c.price,customText:c.customText,refPreview:c.refPreview})),
    timestamp: new Date().toLocaleString(), done: false
  };
  data.orders = data.orders||[];
  data.orders.unshift(order);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  cart = [];
  document.getElementById('cartCount').textContent = 0;
  document.getElementById('checkoutModal').style.display = 'none';
  document.getElementById('cartItems').innerHTML = `<div class="order-success"><h2>✦ Order Placed!</h2><p>Thank you ${name}!<br>We'll get your goodies ready 🩷</p></div>`;
  document.getElementById('cartCheckout').innerHTML = '';
}

function makeSparkles() {
  const bg = document.getElementById('sparkles');
  const colors = ['#E8B4F8','#FFB7C5','#CCCCFF','#fff','#C39BD3','#FFD6E7'];
  for(let i=0;i<50;i++){
    const el = document.createElement('div');
    el.className='sp';
    const size=Math.random()*5+2;
    el.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;position:absolute;`;
    bg.appendChild(el);
  }
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='sparkle-star';
    el.textContent=['✦','✧','✵','✸','✺'][Math.floor(Math.random()*5)];
    el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;font-size:${8+Math.random()*10}px;position:absolute;`;
    bg.appendChild(el);
  }
}

makeSparkles();
renderShop();
setInterval(()=>{
  const active=document.querySelector('.page.active');
  if(active){
    if(active.id==='page-shop') renderShop();
    if(active.id==='page-events') renderEvents();
    if(active.id==='page-about') renderAbout();
  }
},3000);
</script>
</body>
</html>
